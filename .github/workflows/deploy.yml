name: Merbis Web Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: mersin-prod
    steps:
      - uses: actions/checkout@v4

      - name: Set environment variables
        run: |
          COMMIT_SHA="${{ github.sha }}"
          IMAGE_TAG="localhost:5000/merbis-web:${COMMIT_SHA}"
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          echo "COMMIT_SHA=$COMMIT_SHA" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker build \
            --network=host \
            --build-arg PUBLIC_GOOGLE_MAPS_API_KEY="${{ secrets.GOOGLE_MAPS_API_KEY }}" \
            -t "${{ env.IMAGE_TAG }}" \
            -t "localhost:5000/merbis-web:latest" .
          echo "Built image: ${{ env.IMAGE_TAG }}"

      - name: Push Docker image
        run: |
          docker push "${{ env.IMAGE_TAG }}"
          docker push "localhost:5000/merbis-web:latest"

      - name: Update deployment manifest
        run: |
          sed -i "s|image: localhost:5000/merbis-web:.*|image: ${{ env.IMAGE_TAG }}|" k8s/merbis-web-deployment.yaml

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/merbis-web-service.yaml
          kubectl apply -f k8s/merbis-web-ingress.yaml
          kubectl apply -f k8s/merbis-web-deployment.yaml
          kubectl rollout status deployment/merbis-web -n mersin --timeout=120s
          echo "Deployed to: https://merbis.mersin.bel.tr"

      - name: Verify deployment
        run: |
          echo "--- Pod Status ---"
          kubectl get pods -n mersin -l app=merbis-web
          echo "--- Ingress ---"
          kubectl get ingress merbis-web-ingress -n mersin
